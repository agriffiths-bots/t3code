name: Stable Artifact Release

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*-*"
      - "!v*+*"

permissions:
  contents: write

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - id: meta
        name: Resolve stable release version
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Stable artifact releases require plain semver tags like v1.2.3."
            exit 1
          fi
          version="${TAG_NAME#v}"
          echo "release_tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=T3 Code $version" >> "$GITHUB_OUTPUT"
          echo "release_version=$version" >> "$GITHUB_OUTPUT"

  publish_artifacts:
    name: Build and publish artifacts
    needs: metadata
    uses: ./.github/workflows/reusable-build-release-artifacts.yml
    # This fork intentionally publishes Android APK and Windows x64 artifacts only.
    with:
      ref: ${{ github.sha }}
      release_tag: ${{ needs.metadata.outputs.release_tag }}
      release_name: ${{ needs.metadata.outputs.release_name }}
      release_version: ${{ needs.metadata.outputs.release_version }}
      prerelease: false
      make_latest: true
    secrets: inherit
