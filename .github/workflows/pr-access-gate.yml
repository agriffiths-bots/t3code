name: PR Access Gate

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    name: Close unauthorized PRs
    runs-on: ubuntu-24.04
    steps:
      - name: Enforce allowed PR authors
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPOSITORY: ${{ github.repository }}
          ALLOWED_PR_AUTHORS: ${{ vars.ALLOWED_PR_AUTHORS }}
        shell: bash
        run: |
          set -euo pipefail

          allowed="adamfgr,app/wizzoapp,wizzoapp[bot],wizzobot,wizzobot[bot],${ALLOWED_PR_AUTHORS:-}"

          IFS=',' read -r -a allowed_authors <<< "$allowed"
          for allowed_author in "${allowed_authors[@]}"; do
            if [[ -n "$allowed_author" && "$PR_AUTHOR" == "$allowed_author" ]]; then
              echo "PR author '$PR_AUTHOR' is allowed."
              exit 0
            fi
          done

          echo "::warning::Closing PR #$PR_NUMBER from unauthorized author '$PR_AUTHOR'."
          gh pr close "$PR_NUMBER" --repo "$REPOSITORY"
