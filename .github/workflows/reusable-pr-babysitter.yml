name: Reusable PR Babysitter

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull request number to maintain"
        required: true
        type: number
    secrets:
      OPENAI_API_KEY:
        description: "OpenAI API key used by openai/codex-action"
        required: false
      WIZZOAPP_GITHUB_TOKEN:
        description: "Optional WizzoApp token used to push babysitter commits"
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read
  checks: read

jobs:
  babysit:
    name: Babysit PR #${{ inputs.pr_number }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ secrets.WIZZOAPP_GITHUB_TOKEN || github.token }}
      PR_NUMBER: ${{ inputs.pr_number }}
      CODEX_BABYSITTER_GIT_NAME: ${{ vars.CODEX_BABYSITTER_GIT_NAME }}
      CODEX_BABYSITTER_GIT_EMAIL: ${{ vars.CODEX_BABYSITTER_GIT_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.WIZZOAPP_GITHUB_TOKEN || github.token }}

      - name: Checkout PR branch
        shell: bash
        run: gh pr checkout "$PR_NUMBER"

      - id: base_ref
        name: Resolve PR base branch
        shell: bash
        run: |
          set -euo pipefail
          base_ref="$(gh pr view "$PR_NUMBER" --json baseRefName --jq .baseRefName)"
          echo "name=$base_ref" >> "$GITHUB_OUTPUT"
          git fetch origin "$base_ref" --depth=1

      - id: base_state_script
        name: Read reviewer state script from base branch
        shell: bash
        run: |
          set -euo pipefail
          script_dir="$RUNNER_TEMP/codex-babysitter"
          script_path="$script_dir/pr-babysitter-state.mjs"
          mkdir -p "$script_dir"
          if git show "origin/${{ steps.base_ref.outputs.name }}:.github/scripts/pr-babysitter-state.mjs" > "$script_path"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "path=$script_path" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Base branch does not contain .github/scripts/pr-babysitter-state.mjs; skipping reviewer-state automation."
          fi

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "${CODEX_BABYSITTER_GIT_NAME:-wizzoapp[bot]}"
          git config user.email "${CODEX_BABYSITTER_GIT_EMAIL:-254688279+wizzoapp[bot]@users.noreply.github.com}"

      - id: state_before
        name: Read reviewer state
        if: steps.base_state_script.outputs.available == 'true'
        run: node "${{ steps.base_state_script.outputs.path }}"

      - id: openai_key
        name: Check for OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          if [[ -n "$OPENAI_API_KEY" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is not configured; skipping Codex babysitter execution."
          fi

      - name: Enable auto-merge when reviewer gates are already satisfied
        if: steps.state_before.outputs.ready_to_merge == 'true'
        shell: bash
        run: gh pr merge "$PR_NUMBER" --auto --squash --delete-branch

      - id: base_prompt
        name: Read Codex prompt from base branch
        if: steps.state_before.outputs.ready_to_merge != 'true' && steps.openai_key.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          prompt_dir="$RUNNER_TEMP/codex-babysitter"
          prompt_path="$prompt_dir/pr-babysit.md"
          mkdir -p "$prompt_dir"
          if git show "origin/${{ steps.base_ref.outputs.name }}:.github/codex/prompts/pr-babysit.md" > "$prompt_path"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "path=$prompt_path" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Base branch does not contain .github/codex/prompts/pr-babysit.md; skipping Codex babysitter execution."
          fi

      - name: Setup Vite+
        if: steps.state_before.outputs.ready_to_merge != 'true' && steps.openai_key.outputs.present == 'true' && steps.base_prompt.outputs.available == 'true'
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Run Codex babysitter
        if: steps.state_before.outputs.ready_to_merge != 'true' && steps.openai_key.outputs.present == 'true' && steps.base_prompt.outputs.available == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.base_prompt.outputs.path }}
          sandbox: workspace-write
          codex-args: '["--full-auto"]'
          output-file: codex-babysitter-output.md

      - name: Commit and push Codex changes
        if: steps.state_before.outputs.ready_to_merge != 'true' && steps.openai_key.outputs.present == 'true' && steps.base_prompt.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "fix: address automated review feedback"
          git push

      - name: Ask reviewers to re-check
        if: steps.state_before.outputs.ready_to_merge != 'true' && steps.openai_key.outputs.present == 'true' && steps.base_prompt.outputs.available == 'true'
        shell: bash
        run: |
          gh pr comment "$PR_NUMBER" --body $'@codex review\n\n@greptileai review'

      - name: Upload Codex babysitter output
        if: always() && steps.state_before.outputs.ready_to_merge != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: codex-babysitter-output-${{ inputs.pr_number }}
          path: codex-babysitter-output.md
          if-no-files-found: ignore
