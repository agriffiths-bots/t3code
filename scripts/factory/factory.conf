# factory.conf — repo-specific knobs for the software-factory commit gate.
# Sourced (bash) by scripts/factory/precommit-gate.sh. Fork-local file: never
# expect this upstream.

# Static checks, run from the repo root in order; all must exit 0. These must
# NOT modify files (no --fix inside the gate — fix, re-stage, retry instead).
FACTORY_STATIC_CHECKS=(
  "node_modules/.bin/vp run typecheck"
  "node_modules/.bin/vp check"
)

# Autoreview helper + panel. Models are pinned explicitly so a helper-default
# drift can't silently change the reviewers.
FACTORY_AUTOREVIEW_BIN="${AUTOREVIEW:-$HOME/.claude/skills/autoreview/scripts/autoreview}"
FACTORY_REVIEW_ARGS=(
  --reviewers codex,claude
  --model codex=gpt-5.5 --thinking codex=high
  --model claude=claude-opus-4-8 --thinking claude=max
)

# Ref used to structurally verify "upstream-origin" dismissals: a dismissal is
# only accepted when the staged blob is byte-identical to this ref's blob.
FACTORY_UPSTREAM_REF="upstream/main"

# Audit log (JSONL, appended) for every gate decision, dismissal, and skip.
FACTORY_AUDIT_LOG="$HOME/.openclaw/audit/factory-precommit.jsonl"
